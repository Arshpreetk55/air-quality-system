<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AirSense — Alerts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#080b14; --bg-1:#0d1220;
    --panel:rgba(255,255,255,0.04); --panel-border:rgba(255,255,255,0.08);
    --ink:#e9edf5; --ink-dim:#8891a5; --ink-faint:#5a6376;
    --aqi-good:#33d17a; --aqi-moderate:#e6d84f; --aqi-sensitive:#f4a942;
    --aqi-unhealthy:#f4573f; --aqi-very-unhealthy:#b355e0; --aqi-hazardous:#8a3550;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Inter',sans-serif;color:var(--ink);min-height:100vh;padding:28px 20px 60px;
    background:
      radial-gradient(circle at 15% -10%, rgba(51,209,122,0.10), transparent 45%),
      radial-gradient(circle at 90% 10%, rgba(179,85,224,0.10), transparent 40%),
      linear-gradient(180deg,var(--bg-0),var(--bg-1) 60%,var(--bg-0));
    position:relative;overflow-x:hidden;
  }
  .particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .particles span{position:absolute;bottom:-10px;width:var(--s,3px);height:var(--s,3px);
    background:var(--c,rgba(233,237,245,0.35));border-radius:50%;
    animation:rise var(--d,18s) linear infinite;animation-delay:var(--delay,0s);left:var(--l,50%);}
  @keyframes rise{0%{transform:translateY(0) translateX(0);opacity:0;}10%{opacity:1;}90%{opacity:1;}
    100%{transform:translateY(-110vh) translateX(20px);opacity:0;}}
  @media (prefers-reduced-motion: reduce){.particles{display:none;}}

  header{max-width:760px;margin:0 auto 30px;display:flex;align-items:center;justify-content:space-between;
    gap:16px;flex-wrap:wrap;position:relative;z-index:1;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .mark{width:38px;height:38px;border-radius:11px;
    background:linear-gradient(135deg,var(--aqi-good),var(--aqi-sensitive));
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif;font-weight:700;color:#0a0d14;font-size:1.05rem;
    box-shadow:0 6px 24px -8px rgba(51,209,122,0.5);}
  .brand h1{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:600;letter-spacing:-0.01em;}
  .brand .sub{font-size:0.72rem;color:var(--ink-faint);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;}
  nav.navbar{display:flex;gap:6px;flex-wrap:wrap;}
  .navbar a{color:var(--ink-dim);text-decoration:none;font-size:0.86rem;font-weight:500;
    padding:8px 14px;border-radius:9px;transition:all .18s ease;border:1px solid transparent;}
  .navbar a:hover{color:var(--ink);background:var(--panel);border-color:var(--panel-border);}
  .navbar a.active{color:var(--ink);background:var(--panel);border-color:var(--panel-border);}

  main{max-width:760px;margin:0 auto;position:relative;z-index:1;}

  .page-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;margin-bottom:22px;}
  .page-head h2{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:600;}
  .page-head p{color:var(--ink-faint);font-size:0.86rem;margin-top:4px;}
  .count-badge{
    background:var(--panel);border:1px solid var(--panel-border);border-radius:100px;
    padding:8px 16px;font-size:0.82rem;color:var(--ink-dim);font-family:'JetBrains Mono',monospace;
    backdrop-filter:blur(10px);
  }

  .list{display:flex;flex-direction:column;gap:10px;}
  .alert-item{
    background:var(--panel);border:1px solid var(--panel-border);border-left:3px solid var(--aqi-unhealthy);
    border-radius:14px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;
    gap:12px;flex-wrap:wrap;backdrop-filter:blur(14px);transition:transform .15s ease;
  }
  .alert-item:hover{transform:translateX(2px);}
  .alert-item .left{display:flex;align-items:center;gap:14px;flex-wrap:wrap;min-width:0;}
  .alert-item .badge{
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1.1rem;
    padding:6px 12px;border-radius:8px;background:rgba(244,87,63,0.14);color:var(--aqi-unhealthy);
    flex-shrink:0;
  }
  .alert-item .label{font-size:0.86rem;color:var(--ink-dim);}
  .alert-item .time{color:var(--ink-faint);font-size:0.8rem;font-family:'JetBrains Mono',monospace;white-space:nowrap;}

  .empty{
    text-align:center;color:var(--ink-faint);padding:60px 20px;
    background:var(--panel);border:1px solid var(--panel-border);border-radius:18px;backdrop-filter:blur(18px);
  }
  .empty .emoji{font-size:2rem;margin-bottom:10px;}

  footer{max-width:760px;margin:26px auto 0;text-align:center;color:var(--ink-faint);font-size:0.76rem;position:relative;z-index:1;}

  @media (max-width:480px){
    .alert-item{flex-direction:column;align-items:flex-start;}
    .page-head{flex-direction:column;align-items:flex-start;}
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<header>
  <div class="brand">
    <div class="mark">A</div>
    <div><h1>AirSense</h1><div class="sub">Ambient air monitor</div></div>
  </div>
  <nav class="navbar">
    <a href="/">Live</a>
    <a href="/about.html">About</a>
    <a href="/history.html">History</a>
    <a href="/settings.html">Settings</a>
    <a href="/alerts.html" class="active">Alerts</a>
  </nav>
</header>

<main>
  <div class="page-head">
    <div>
      <h2>Alert history</h2>
      <p>Every time a reading crossed your threshold, it's logged here.</p>
    </div>
    <div class="count-badge" id="countBadge">— alerts</div>
  </div>

  <div class="list" id="alertList"></div>
</main>

<footer>AirSense — built on Firebase &amp; Chart.js</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA8ieDbZY66Kqr0cPkscB0_JxVCsH4TwDc",
    authDomain: "air-quality-monitoring-s-1551f.firebaseapp.com",
    databaseURL: "https://air-quality-monitoring-s-1551f-default-rtdb.firebaseio.com",
    projectId: "air-quality-monitoring-s-1551f",
    storageBucket: "air-quality-monitoring-s-1551f.firebasestorage.app",
    messagingSenderId: "630203906956",
    appId: "1:630203906956:web:65e968db4045a477b4b4a9",
    measurementId: "G-4ZWFMH9YW1"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const pWrap = document.getElementById('particles');
  const colors = ['rgba(233,237,245,0.3)','rgba(51,209,122,0.35)','rgba(179,85,224,0.3)'];
  for (let i = 0; i < 26; i++) {
    const s = document.createElement('span');
    s.style.setProperty('--l', Math.random()*100 + '%');
    s.style.setProperty('--d', (14 + Math.random()*14) + 's');
    s.style.setProperty('--delay', (Math.random()*18) + 's');
    s.style.setProperty('--s', (2 + Math.random()*3) + 'px');
    s.style.setProperty('--c', colors[i % colors.length]);
    pWrap.appendChild(s);
  }

  const list = document.getElementById('alertList');
  const countBadge = document.getElementById('countBadge');

  function renderAlerts(alerts) {
    countBadge.textContent = alerts.length + (alerts.length === 1 ? ' alert' : ' alerts');
    list.innerHTML = '';
    if (alerts.length === 0) {
      list.innerHTML = '<div class="empty"><div class="emoji">✓</div>No alerts recorded — air quality has stayed within range.</div>';
      return;
    }
    alerts.forEach(a => {
      const div = document.createElement('div');
      div.className = 'alert-item';
      div.innerHTML =
        '<div class="left"><span class="badge">' + a.value + '</span><span class="label">' + a.sensor + ' exceeded threshold</span></div>' +
        '<span class="time">' + a.timestamp + '</span>';
      list.appendChild(div);
    });
  }

  const q = query(collection(db, 'alerts'), orderBy('timestamp', 'desc'), limit(100));
  onSnapshot(q, (snap) => {
    const alerts = snap.docs.map(d => {
      const data = d.data();
      return {
        sensor: data.sensor,
        value: data.value,
        timestamp: data.timestamp ? data.timestamp.toDate().toLocaleString() : ''
      };
    });
    renderAlerts(alerts);
  });
</script>
</body>
</html>
