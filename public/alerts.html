const analytics = getAnalytics(app);
  const list = document.getElementById('alertList');

  function renderAlerts(alerts) {
    list.innerHTML = '';
    if (alerts.length === 0) { list.innerHTML = '<p class="empty">No alerts recorded yet 🎉</p>'; return; }
    alerts.forEach(a => {
      const div = document.createElement('div');
      div.className = 'alert-item';
      div.innerHTML = `<span>⚠️ PPM: ${a.ppm}</span><span class="time">${a.timestamp}</span>`;
      list.appendChild(div);
    });
  }

  const q = query(collection(db, 'alerts'), orderBy('timestamp', 'desc'), limit(100));
  onSnapshot(q, (snap) => {
    const alerts = snap.docs.map(d => {
      const data = d.data();
      return {
        ppm: data.ppm,
        timestamp: data.timestamp ? data.timestamp.toDate().toLocaleString() : ''
      };
    });
    renderAlerts(alerts);
  });
