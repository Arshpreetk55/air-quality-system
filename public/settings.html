<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><title>Settings - Air Quality</title>
<style>
  body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1e293b,#0f172a);color:#f1f5f9;padding:30px;}
  h1{text-align:center;margin-bottom:20px;}
  .navbar{display:flex;justify-content:center;gap:15px;margin-bottom:25px;flex-wrap:wrap;}
  .navbar a{color:#f1f5f9;text-decoration:none;background:#334155;padding:8px 16px;border-radius:8px;}
  .card{max-width:500px;margin:0 auto 20px;background:#1e293b;border-radius:14px;padding:25px;border:1px solid #334155;}
  label{display:block;margin-bottom:8px;color:#94a3b8;}
  input{width:100%;padding:10px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#f1f5f9;margin-bottom:15px;}
  button{background:#38bdf8;color:#0f172a;border:none;padding:10px 20px;border-radius:8px;font-weight:bold;cursor:pointer;width:100%;}
  .export-btn{background:#22c55e;}
  #saveMsg{text-align:center;color:#22c55e;margin-top:10px;display:none;}
</style>
</head>
<body>
  <h1>⚙️ Settings</h1>
  <nav class="navbar">
    <a href="/">🏠 Live</a><a href="/history.html">📈 History</a>
    <a href="/settings.html">⚙️ Settings</a><a href="/alerts.html">🚨 Alerts</a>
  </nav>
  <div class="card">
    <label for="threshold">Air Quality HIGH Threshold (PPM)</label>
    <input type="number" id="threshold" placeholder="250">
    <button onclick="saveThreshold()">Save Threshold</button>
    <p id="saveMsg">✅ Saved!</p>
  </div>
  <div class="card">
    <label>Export all recorded readings as CSV</label>
    <button class="export-btn" onclick="exportCSV()">⬇️ Download CSV</button>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8ieDbZY66Kqr0cPkscB0_JxVCsH4TwDc",
  authDomain: "air-quality-monitoring-s-1551f.firebaseapp.com",
  databaseURL: "https://air-quality-monitoring-s-1551f-default-rtdb.firebaseio.com",
  projectId: "air-quality-monitoring-s-1551f",
  storageBucket: "air-quality-monitoring-s-1551f.firebasestorage.app",
  messagingSenderId: "630203906956",
  appId: "1:630203906956:web:65e968db4045a477b4b4a9",
  measurementId: "G-4ZWFMH9YW1"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
  const settingsRef = doc(db, 'settings', 'config');

  // load current threshold
  getDoc(settingsRef).then(snap => {
    const value = snap.exists() ? snap.data().threshold : 250;
    document.getElementById('threshold').value = value;
  });

  window.saveThreshold = async function () {
    const value = Number(document.getElementById('threshold').value);
    if (!value || isNaN(value)) return alert('Invalid threshold');
    await setDoc(settingsRef, { threshold: value }, { merge: true });
    const msg = document.getElementById('saveMsg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 2000);
  };

  window.exportCSV = async function () {
    const q = query(collection(db, 'readings'), orderBy('timestamp', 'desc'), limit(5000));
    const snap = await getDocs(q);
    let csv = 'id,ppm,temp,hum,timestamp\n';
    snap.docs.forEach(d => {
      const data = d.data();
      const ts = data.timestamp ? data.timestamp.toDate().toLocaleString() : '';
      csv += `${d.id},${data.ppm},${data.temp},${data.hum},${ts}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'sensor_readings.csv';
    a.click();
    URL.revokeObjectURL(url);
  };
</script>
</body>
</html>
